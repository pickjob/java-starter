plugins {
    id 'java'
    id 'application'
    id 'idea'
    id 'com.zyxist.chainsaw' version '0.3.1'
    id "me.champeau.gradle.jmh" version "0.4.8"
}

group 'pickjob'
version '0.0.1'
javaModule.name = 'pickjob.java.starter'
mainClassName = 'app.Application'
dependencies {
    // logging
    implementation 'org.apache.logging.log4j:log4j-api:2.11.1'
    implementation 'org.apache.logging.log4j:log4j-core:2.11.1'
    implementation 'org.apache.logging.log4j:log4j-slf4j-impl:2.11.1'
    // apache commons
    implementation 'org.apache.commons:commons-lang3:3.8'
    // javaee
    implementation 'javax.el:javax.el-api:3.0.0'
    implementation 'javax.validation:validation-api:2.0.1.Final'
    implementation 'javax.jms:javax.jms-api:2.0.1'
    implementation 'javax.management.j2ee:javax.management.j2ee-api:1.1.2'
    // validation
    implementation 'org.hibernate:hibernate-validator:6.0.14.Final'
    // mysql driver
    implementation 'mysql:mysql-connector-java:8.0.15'
    // charset
    implementation 'net.freeutils:jcharset:2.0'
    // netty
    implementation 'io.netty:netty-all:4.1.31.Final'
    // zookeeper
    implementation ('org.apache.zookeeper:zookeeper:3.4.13') {
        exclude group: 'io.netty'
        exclude group: 'org.slf4j'
        exclude group: 'log4j'
    }
    // jackson
    implementation 'com.fasterxml.jackson.core:jackson-core:2.9.8'
    implementation 'com.fasterxml.jackson.core:jackson-databind:2.9.8'
    implementation 'com.fasterxml.jackson.core:jackson-annotations:2.9.8'
    implementation 'com.fasterxml.jackson.dataformat:jackson-dataformat-yaml:2.9.8'
    // rocketmq
    implementation ('org.apache.rocketmq:rocketmq-client:4.3.0') {
        exclude group: 'io.netty'
    }
    // activemq
    implementation ('org.apache.activemq:activemq-client:5.15.8') {
        exclude group: 'org.apache.geronimo.specs'
    }
    

    testImplementation 'org.junit.jupiter:junit-jupiter-api:5.4.2'
    testImplementation 'org.junit.jupiter:junit-jupiter-engine:5.4.2'
    testImplementation 'org.junit.jupiter:junit-jupiter-params:5.4.2'

}

repositories {
    maven {
        url "https://maven.aliyun.com/repository/central"
    }
}
/*
 *  Plugin: java配置
 */
compileJava {
    sourceCompatibility = 11
    targetCompatibility = 11
    options.encoding = 'UTF-8'
}
compileTestJava {
    sourceCompatibility = 11
    targetCompatibility = 11
    options.encoding = 'UTF-8'
}
processResources {
    destinationDir = sourceSets.main.java.outputDir
}
processTestResources {
    destinationDir = sourceSets.test.java.outputDir
}
jar {
    manifest {
        attributes 'Main-Class': "${mainClassName}"
        attributes 'Class-Path': configurations.runtimeClasspath.files.collect { it.name }.join(' ')
    }
    from {
        configurations.runtimeClasspath.collect { it.isDirectory() ? it : zipTree(it) }
    }
}
test {
    // JUNIT5
    useJUnitPlatform()
}
/*
 * Plugin: Appliction
 */
run { 
    main = "${mainClassName}"
}
/*
 *  Plugin: idea 配置
 */
idea {
    module {
        downloadJavadoc = true
        downloadSources = true
        inheritOutputDirs = false
        outputDir = sourceSets.main.java.outputDir
        testOutputDir = sourceSets.test.java.outputDir
    }
}