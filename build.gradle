plugins {
    id 'java'
    id 'idea'
    id 'application'
    id 'org.gradle.java.experimental-jigsaw' version '0.1.1'
}

group 'pickjob'
version '0.0.1'
mainClassName = 'app.Application'
sourceCompatibility = 11
targetCompatibility = 11
javaModule.name = 'pickjob.java.starter'

dependencies {
    // logging
    implementation 'org.apache.logging.log4j:log4j-api:2.11.1'
    implementation 'org.apache.logging.log4j:log4j-core:2.11.1'
    implementation 'org.apache.logging.log4j:log4j-slf4j-impl:2.11.1'
    // apache commons
    implementation 'org.apache.commons:commons-lang3:3.8'
    // validation
    implementation 'org.glassfish:javax.el:3.0.1-b09'
    implementation 'org.hibernate:hibernate-validator:6.0.14.Final'
    // charset
    implementation 'net.freeutils:jcharset:2.0'
    // netty
    implementation 'io.netty:netty-all:4.1.31.Final'
    // zookeeper
    implementation ('org.apache.zookeeper:zookeeper:3.4.13') {
        exclude group: 'io.netty'
        exclude group: 'org.slf4j'
        exclude group: 'log4j'
    }
    // jackson
    implementation 'com.fasterxml.jackson.core:jackson-core:2.9.8'
    implementation 'com.fasterxml.jackson.core:jackson-databind:2.9.8'
    implementation 'com.fasterxml.jackson.core:jackson-annotations:2.9.8'
    implementation 'com.fasterxml.jackson.dataformat:jackson-dataformat-yaml:2.9.8'
    // rocketmq
    implementation ('org.apache.rocketmq:rocketmq-client:4.3.0') {
        exclude group: 'io.netty'
    }

    testImplementation 'junit:junit:4.12'
}

repositories {
    maven {
        url "https://maven.aliyun.com/repository/central"
    }
}

idea {
    module {
        downloadJavadoc = true
        downloadSources = true
        inheritOutputDirs = false
        outputDir = file("$buildDir/classes/java/main/")
        testOutputDir = file("$buildDir/classes/java/test/")
    }
}

sourceSets {
    main {
        output.resourcesDir = file("$buildDir/classes/java/main")
    }
    test {
        output.resourcesDir = file("$buildDir/classes/java/test/")
    }
}

// Fat jar package
jar {
    manifest {
        attributes 'Main-Class': "${mainClassName}"
        attributes 'Class-Path': configurations.runtimeClasspath.files.collect { it.name }.join(' ')
    }
    from {
        configurations.runtimeClasspath.collect { it.isDirectory() ? it : zipTree(it) }
    }
}